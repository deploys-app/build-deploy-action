name: Build and Deploy to Deploys.app
description: >-
  Build a Dockerfile, push it to registry.deploys.app, and deploy — keyless via
  GitHub OIDC. Pull requests get temporary preview deployments with a sticky
  preview comment and GitHub deployment statuses.
author: Deploys.app
branding:
  color: purple
  icon: cloud

inputs:
  project:
    description: Project ID
    required: true
  location:
    description: Deploy location ID (e.g. gke.cluster-rcf2)
    required: true
  name:
    description: >-
      Base deployment name. Pull request runs deploy to <name>-pr-<number>.
    required: true
  mode:
    description: >-
      Build mode: `dockerfile` (default) builds and pushes a container image;
      `static` builds a static site, uploads it as a content-addressed release,
      and deploys it as a Static deployment (no image, no port, no registry).
    required: false
    default: dockerfile
  workingDirectory:
    description: >-
      Root folder of the app to build, relative to the repo — for monorepos,
      e.g. apps/web. In dockerfile mode the build context and the default
      Dockerfile path resolve under it; in static mode the build command runs
      inside it and outputDir is read relative to it. Defaults to the repo root.
    required: false
    default: .
  context:
    description: Docker build context, resolved relative to workingDirectory
    required: false
    default: .
  dockerfile:
    description: >-
      Dockerfile path, resolved relative to workingDirectory
      (default <workingDirectory>/<context>/Dockerfile)
    required: false
    default: ''
  buildArgs:
    description: Docker build args, one KEY=VALUE per line
    required: false
    default: ''
  framework:
    description: >-
      Static build framework (mode=static only): `auto` (default) detects Hugo
      via .tool-versions/hugo.toml/config.toml, else Node via package.json;
      `hugo` forces Hugo extended; `node` forces Node; `none` requires an
      explicit buildCommand.
    required: false
    default: auto
  buildCommand:
    description: >-
      Static build command (mode=static only). Defaults per framework: Hugo ->
      `hugo --minify` if the repo Makefile's build target uses it else `hugo`;
      Node -> `npm run build`. Required when framework=none.
    required: false
    default: ''
  outputDir:
    description: >-
      Built static tree to upload (mode=static only). `public` for Hugo,
      `dist`/`build` for Node SPAs.
    required: false
    default: public
  nodeVersion:
    description: >-
      Node toolchain version for the `node` framework (mode=static only).
      Defaults to .nvmrc/.tool-versions, else 20.
    required: false
    default: ''
  spa:
    description: >-
      SPA fallback to index.html on unknown routes (mode=static only). Default
      false — Hugo sites are not SPAs (clean-URL resolution + a real 404). Set
      true for Vite/React SPAs.
    required: false
    default: 'false'
  notFound:
    description: >-
      Custom 404 document served on clean-URL misses when spa=false (mode=static
      only).
    required: false
    default: 404.html
  baseUrl:
    description: >-
      Build-time base URL (mode=static only). If empty, the action injects the
      planned deploy URL (production or preview host, resolved via location.get)
      so sitemap.xml/RSS carry the correct host.
    required: false
    default: ''
  port:
    description: Container port (WebService/TCPService)
    required: false
    default: '8080'
  type:
    description: Deployment type (WebService, Worker, TCPService, InternalTCPService)
    required: false
    default: WebService
  env:
    description: Environment variables for the deployment, one KEY=VALUE per line
    required: false
    default: ''
  envGroups:
    description: >-
      Env groups to attach to the deployment, one per line or comma-separated.
      Each must already exist in the project (envGroup.create / the console).
    required: false
    default: ''
  pullSecret:
    description: >-
      Pull secret name for the image registry (dockerfile mode only). Use this
      when the deployment must authenticate to a private registry; the secret
      must already exist in the deploy location. Ignored in static mode.
    required: false
    default: ''
  previewTtl:
    description: >-
      Preview deployment TTL (Ns/Nm/Nh/Nd), re-applied on every push so it
      rolls. Previews are also deleted when the pull request closes.
    required: false
    default: 7d
  apiEndpoint:
    description: Deploys.app API endpoint
    required: false
    default: https://api.deploys.app
  registry:
    description: Deploys.app registry host
    required: false
    default: registry.deploys.app

outputs:
  deployment:
    description: The deployed deployment name (base name, or <name>-pr-<n> for previews)
    value: ${{ steps.plan.outputs.deployment }}
  environment:
    description: production, or pr-<n> for previews
    value: ${{ steps.plan.outputs.environment }}
  artifact:
    description: >-
      The deployed artifact: the pushed image in digest form (mode=dockerfile)
      or the static release-sha (mode=static).
    value: ${{ inputs.mode == 'static' && steps.deploy-static.outputs.artifact || steps.deploy.outputs.artifact }}
  image:
    description: >-
      Deprecated alias of `artifact` (the pushed image in digest form for
      mode=dockerfile). Kept for one minor version; use `artifact`.
    value: ${{ inputs.mode == 'static' && steps.deploy-static.outputs.artifact || steps.deploy.outputs.artifact }}
  url:
    description: The deployed URL
    value: ${{ inputs.mode == 'static' && steps.deploy-static.outputs.url || steps.deploy.outputs.url }}

runs:
  using: composite
  steps:
    - id: auth
      name: Exchange GitHub OIDC token for a deploys token
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
      run: |
        set -euo pipefail

        # The workflow needs `permissions: id-token: write`.
        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::error::missing OIDC token support — add 'permissions: id-token: write' to the workflow" >&2
          exit 1
        fi
        github_token=$(curl -sSf -H "Authorization: Bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=https://deploys.app" | jq -r '.value')
        echo "::add-mask::$github_token"

        resp=$(curl -sSf -X POST "$API/github.exchangetoken" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n --arg t "$github_token" '{token: $t}')")
        if [ "$(jq -r '.ok' <<<"$resp")" != "true" ]; then
          echo "::error::token exchange failed: $(jq -r '.error.message // "unknown error"' <<<"$resp") — is this repository linked to the project? (github.link)" >&2
          exit 1
        fi
        deploys_token=$(jq -r '.result.token' <<<"$resp")
        echo "::add-mask::$deploys_token"

        {
          echo "github_token=$github_token"
          echo "deploys_token=$deploys_token"
        } >> "$GITHUB_OUTPUT"

    - id: plan
      name: Plan deployment
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        DEPLOYS_TOKEN: ${{ steps.auth.outputs.deploys_token }}
        BASE_NAME: ${{ inputs.name }}
        PROJECT: ${{ inputs.project }}
        LOCATION: ${{ inputs.location }}
        REGISTRY: ${{ inputs.registry }}
        EVENT_NAME: ${{ github.event_name }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
        PREVIEW_TTL: ${{ inputs.previewTtl }}
        MODE: ${{ inputs.mode }}
        BASE_URL: ${{ inputs.baseUrl }}
        WORKING_DIRECTORY: ${{ inputs.workingDirectory }}
        CONTEXT: ${{ inputs.context }}
        DOCKERFILE: ${{ inputs.dockerfile }}
      run: |
        set -euo pipefail

        if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ]; then
          deployment="$BASE_NAME-pr-$PR_NUMBER"
          environment="pr-$PR_NUMBER"
          pr_number="$PR_NUMBER"
          # TTL: Ns/Nm/Nh/Nd -> seconds
          if [[ "$PREVIEW_TTL" =~ ^([0-9]+)([smhd])$ ]]; then
            n="${BASH_REMATCH[1]}"
            case "${BASH_REMATCH[2]}" in
              s) ttl=$((n));;
              m) ttl=$((n * 60));;
              h) ttl=$((n * 3600));;
              d) ttl=$((n * 86400));;
            esac
          else
            echo "::error::previewTtl must be <n>s|m|h|d (got '$PREVIEW_TTL')" >&2
            exit 1
          fi
        else
          deployment="$BASE_NAME"
          environment="production"
          pr_number=0
          ttl=0
        fi

        if [ "${#deployment}" -gt 63 ]; then
          echo "::error::deployment name '$deployment' exceeds 63 characters — shorten the name input" >&2
          exit 1
        fi

        # Resolve the dockerfile-mode build context + Dockerfile under
        # workingDirectory (the monorepo root folder). The build context is
        # <workingDirectory>/<context>; an empty/`.` context just means the
        # working directory itself. The Dockerfile, when given, is also relative
        # to the working directory; when left blank we emit nothing so
        # docker/build-push-action applies its own <context>/Dockerfile default
        # (which, since context is the working directory, lands in the right
        # folder). Paths are normalised to drop a leading "./" and collapse a
        # trailing slash so the emitted values stay clean.
        wd="${WORKING_DIRECTORY:-.}"; wd="${wd%/}"; [ -z "$wd" ] && wd="."
        ctx_in="${CONTEXT:-.}"
        if [ "$ctx_in" = "." ] || [ -z "$ctx_in" ]; then
          eff_ctx="$wd"
        elif [ "$wd" = "." ]; then
          eff_ctx="$ctx_in"
        else
          eff_ctx="$wd/$ctx_in"
        fi
        eff_ctx="${eff_ctx#./}"; [ -z "$eff_ctx" ] && eff_ctx="."

        eff_dockerfile=""
        if [ -n "${DOCKERFILE:-}" ]; then
          if [ "$wd" = "." ]; then
            eff_dockerfile="$DOCKERFILE"
          else
            eff_dockerfile="$wd/$DOCKERFILE"
          fi
          eff_dockerfile="${eff_dockerfile#./}"
        fi

        # For static mode, resolve the planned deploy URL pre-build so the build
        # can bake the correct host into sitemap.xml / RSS. The host rule is the
        # one the apiserver + deployer share: <deployment>-<numericProjectID>
        # then <domainSuffix> (deployment_model.go deploymentHost / deployer
        # main.go). The numeric project id comes from project.get, the domain
        # suffix from location.get. If the user set baseUrl explicitly we skip
        # the lookup. Best-effort: a lookup failure leaves planned_url empty and
        # the build falls back to the repo default (the build is not failed on
        # a missing SEO host).
        planned_url=""
        if [ "$MODE" = "static" ] && [ -z "$BASE_URL" ]; then
          proj_resp=$(curl -sSf -X POST "$API/project.get" \
            -H "Authorization: Bearer $DEPLOYS_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg project "$PROJECT" '{project: $project}')" || true)
          project_id=$(jq -r 'if .ok then (.result.id // "") else "" end' <<<"$proj_resp" 2>/dev/null || true)

          loc_resp=$(curl -sSf -X POST "$API/location.get" \
            -H "Authorization: Bearer $DEPLOYS_TOKEN" \
            -H 'Content-Type: application/json' \
            -d "$(jq -n --arg id "$LOCATION" '{id: $id}')" || true)
          domain_suffix=$(jq -r 'if .ok then (.result.domainSuffix // "") else "" end' <<<"$loc_resp" 2>/dev/null || true)

          if [ -n "$project_id" ] && [ -n "$domain_suffix" ]; then
            host="$deployment-$project_id"
            # The apiserver falls back to the id-based kube name when this host
            # label would exceed 63 chars; the action cannot know the kube id
            # pre-build, so for the (rare) overflow we leave planned_url empty
            # and let the build use its default rather than bake a wrong host.
            if [ "${#host}" -le 63 ]; then
              planned_url="https://$host$domain_suffix"
            else
              echo "::warning::planned host '$host$domain_suffix' exceeds 63 chars; skipping baseUrl injection (set baseUrl to override)"
            fi
          else
            echo "::warning::could not resolve planned deploy URL (project.get/location.get); build will use its default base URL (set baseUrl to override)"
          fi
        fi

        {
          echo "deployment=$deployment"
          echo "environment=$environment"
          echo "pr_number=$pr_number"
          echo "ttl=$ttl"
          echo "image_ref=$REGISTRY/$PROJECT/$BASE_NAME"
          echo "planned_url=$planned_url"
          echo "context=$eff_ctx"
          echo "dockerfile=$eff_dockerfile"
        } >> "$GITHUB_OUTPUT"

    - id: notify-started
      name: Report started
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        GITHUB_OIDC: ${{ steps.auth.outputs.github_token }}
        PROJECT: ${{ inputs.project }}
        LOCATION: ${{ inputs.location }}
        DEPLOYMENT: ${{ steps.plan.outputs.deployment }}
        ENVIRONMENT: ${{ steps.plan.outputs.environment }}
        PR_NUMBER: ${{ steps.plan.outputs.pr_number }}
      run: |
        set -euo pipefail
        # Best-effort: a notify failure must not fail the build.
        curl -sS -X POST "$API/github.notify" \
          -H "Authorization: Bearer $GITHUB_OIDC" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n \
            --arg project "$PROJECT" --arg location "$LOCATION" \
            --arg deployment "$DEPLOYMENT" --arg environment "$ENVIRONMENT" \
            --argjson prNumber "$PR_NUMBER" \
            --arg sha "$GITHUB_SHA" --arg ref "$GITHUB_REF" \
            '{event: "started", project: $project, location: $location,
              deployment: $deployment, environment: $environment,
              prNumber: $prNumber, sha: $sha, ref: $ref}')" \
          | jq -r 'if .ok then empty else "::warning::notify(started) failed: \(.error.message // "unknown error")" end' \
          || echo "::warning::notify(started) failed"

    - name: Set up Docker Buildx
      if: inputs.mode != 'static'
      uses: docker/setup-buildx-action@v3

    - name: Log in to registry.deploys.app
      if: inputs.mode != 'static'
      uses: docker/login-action@v3
      with:
        registry: ${{ inputs.registry }}
        username: oauth2accesstoken
        password: ${{ steps.auth.outputs.deploys_token }}

    - id: build
      name: Build and push
      if: inputs.mode != 'static'
      uses: docker/build-push-action@v6
      with:
        context: ${{ steps.plan.outputs.context }}
        file: ${{ steps.plan.outputs.dockerfile }}
        build-args: ${{ inputs.buildArgs }}
        push: true
        tags: ${{ steps.plan.outputs.image_ref }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # --- static build (mode == static) ---------------------------------------

    - id: static-detect
      name: Detect static framework
      if: inputs.mode == 'static'
      shell: bash
      env:
        FRAMEWORK: ${{ inputs.framework }}
        BUILD_COMMAND: ${{ inputs.buildCommand }}
        NODE_VERSION: ${{ inputs.nodeVersion }}
        WORKING_DIRECTORY: ${{ inputs.workingDirectory }}
      run: |
        set -euo pipefail

        # Detect against the app folder (monorepo root folder), so config/toolchain
        # signals are read from where the site actually lives.
        cd "${WORKING_DIRECTORY:-.}"

        # Resolve framework: auto -> Hugo if a Hugo signal is present, else Node
        # if package.json is present, else error.
        framework="$FRAMEWORK"
        if [ "$framework" = "auto" ]; then
          if [ -f .tool-versions ] && grep -qiE '^[[:space:]]*hugo[[:space:]]' .tool-versions; then
            framework="hugo"
          elif [ -f hugo.toml ] || [ -f hugo.yaml ] || [ -f hugo.json ] \
            || [ -f config.toml ] || [ -f config.yaml ] || [ -f config.json ] \
            || [ -d config ]; then
            framework="hugo"
          elif [ -f package.json ]; then
            framework="node"
          else
            echo "::error::framework=auto could not detect Hugo (.tool-versions/hugo.toml/config.toml) or Node (package.json); set framework explicitly" >&2
            exit 1
          fi
        fi

        # Resolve the Hugo extended version from .tool-versions (mandatory: SCSS
        # needs the extended binary). Default to a recent extended release if no
        # pin is found.
        hugo_version=""
        if [ "$framework" = "hugo" ]; then
          if [ -f .tool-versions ]; then
            # ".tool-versions" lines look like: "hugo extended_0.161.1" or
            # "hugo 0.161.1". peaceiris/actions-hugo wants a bare version, with
            # the extended flag set separately.
            raw=$(grep -iE '^[[:space:]]*hugo[[:space:]]' .tool-versions | head -n1 | awk '{print $2}' || true)
            hugo_version="${raw#extended_}"
          fi
          if [ -z "$hugo_version" ]; then
            hugo_version="0.161.1"
            echo "::warning::no Hugo pin in .tool-versions; defaulting to extended $hugo_version"
          fi
        fi

        # Resolve the Node version from input, then .nvmrc/.tool-versions, else 20.
        node_version="$NODE_VERSION"
        if [ "$framework" = "node" ] && [ -z "$node_version" ]; then
          if [ -f .nvmrc ]; then
            node_version=$(tr -d ' \tv' < .nvmrc | head -n1 || true)
          fi
          if [ -z "$node_version" ] && [ -f .tool-versions ]; then
            node_version=$(grep -iE '^[[:space:]]*nodejs[[:space:]]' .tool-versions | head -n1 | awk '{print $2}' || true)
          fi
          if [ -z "$node_version" ]; then
            node_version="20"
          fi
        fi

        # Resolve the build command. Explicit input wins. Otherwise per preset:
        #   hugo -> "hugo --minify" if the Makefile build target uses --minify,
        #           else "hugo"
        #   node -> "npm run build"
        #   none -> required explicit command
        build_command="$BUILD_COMMAND"
        if [ -z "$build_command" ]; then
          case "$framework" in
            hugo)
              if [ -f Makefile ] && grep -qE 'hugo([[:space:]]).*--minify' Makefile; then
                build_command="hugo --minify"
              else
                build_command="hugo"
              fi
              ;;
            node)
              build_command="npm run build"
              ;;
            none)
              echo "::error::framework=none requires an explicit buildCommand" >&2
              exit 1
              ;;
            *)
              echo "::error::unknown framework '$framework' (expected auto|hugo|node|none)" >&2
              exit 1
              ;;
          esac
        fi

        {
          echo "framework=$framework"
          echo "hugo_version=$hugo_version"
          echo "node_version=$node_version"
          echo "build_command=$build_command"
        } >> "$GITHUB_OUTPUT"
        echo "Static build: framework=$framework command=$build_command"

    - name: Set up Hugo
      if: inputs.mode == 'static' && steps.static-detect.outputs.framework == 'hugo'
      uses: peaceiris/actions-hugo@v3
      with:
        hugo-version: ${{ steps.static-detect.outputs.hugo_version }}
        extended: true

    - name: Set up Node
      if: inputs.mode == 'static' && steps.static-detect.outputs.framework == 'node'
      uses: actions/setup-node@v4
      with:
        node-version: ${{ steps.static-detect.outputs.node_version }}

    - id: static-build
      name: Build static site
      if: inputs.mode == 'static'
      shell: bash
      env:
        FRAMEWORK: ${{ steps.static-detect.outputs.framework }}
        BUILD_COMMAND: ${{ steps.static-detect.outputs.build_command }}
        OUTPUT_DIR: ${{ inputs.outputDir }}
        BASE_URL: ${{ inputs.baseUrl }}
        PLANNED_URL: ${{ steps.plan.outputs.planned_url }}
        WORKING_DIRECTORY: ${{ inputs.workingDirectory }}
      run: |
        set -euo pipefail

        # Build inside the app folder (monorepo root folder); outputDir is read
        # relative to it.
        cd "${WORKING_DIRECTORY:-.}"

        # Resolve the base URL to inject: explicit input wins, else the planned
        # deploy URL computed in the plan step.
        base_url="$BASE_URL"
        if [ -z "$base_url" ]; then
          base_url="$PLANNED_URL"
        fi

        # Node frameworks: install deps reproducibly (npm ci when a lockfile is
        # present, else npm install). Hugo needs no install step beyond the
        # toolchain set up above.
        if [ "$FRAMEWORK" = "node" ]; then
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
        fi

        # Inject the base URL. Hugo reads HUGO_BASEURL directly. For Node
        # frameworks the base-path env var is framework-specific (Vite reads
        # BASE_URL/`--base`, Next reads its own config), so we export a few
        # common names and document that the framework must read its own; we do
        # not force a flag that an arbitrary framework may not understand.
        if [ -n "$base_url" ]; then
          if [ "$FRAMEWORK" = "hugo" ]; then
            export HUGO_BASEURL="$base_url"
            echo "HUGO_BASEURL=$base_url"
          else
            export BASE_URL="$base_url"
            echo "BASE_URL=$base_url (the framework must read its own base-path env)"
          fi
        fi

        echo "Running: $BUILD_COMMAND"
        # Build a fresh tree. For Hugo, --cleanDestinationDir avoids shipping
        # stale fingerprinted assets when the repo Makefile has no clean target.
        if [ "$FRAMEWORK" = "hugo" ]; then
          eval "$BUILD_COMMAND --cleanDestinationDir"
        else
          eval "$BUILD_COMMAND"
        fi

        if [ ! -d "$OUTPUT_DIR" ]; then
          echo "::error::outputDir '$OUTPUT_DIR' does not exist after build" >&2
          exit 1
        fi

    - id: publish
      name: Publish static release
      if: inputs.mode == 'static'
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        DEPLOYS_TOKEN: ${{ steps.auth.outputs.deploys_token }}
        PROJECT: ${{ inputs.project }}
        DEPLOYMENT: ${{ steps.plan.outputs.deployment }}
        ENVIRONMENT: ${{ steps.plan.outputs.environment }}
        OUTPUT_DIR: ${{ inputs.outputDir }}
        SPA: ${{ inputs.spa }}
        NOT_FOUND: ${{ inputs.notFound }}
        WORKING_DIRECTORY: ${{ inputs.workingDirectory }}
      run: |
        set -euo pipefail

        # The built tree lives under the app folder (monorepo root folder); walk
        # outputDir relative to it. curl targets absolute API URLs, so the cd is
        # safe.
        cd "${WORKING_DIRECTORY:-.}"

        base="$API/sites/$PROJECT/$DEPLOYMENT"
        out="${OUTPUT_DIR%/}"

        # --- a. open an upload session ---------------------------------------
        sess_resp=$(curl -sSf -X POST "$base/uploads" \
          -H "Authorization: Bearer $DEPLOYS_TOKEN")
        session=$(jq -r 'if .ok then (.result.session // "") else "" end' <<<"$sess_resp")
        if [ -z "$session" ]; then
          echo "::error::failed to open upload session: $(jq -r '.error.message // "unknown error"' <<<"$sess_resp")" >&2
          exit 1
        fi

        # lower lowercases its stdin (portable; avoids the bash-4 ${v,,} so the
        # extension match works on any runner shell version).
        lower() { tr '[:upper:]' '[:lower:]'; }

        # Canonical extension -> Content-Type table (mirrors the apiserver
        # extContentType map; SPEC §4.2/§4.5). The arg is the already-lowercased
        # path. Returns application/octet-stream for unknown extensions.
        content_type_for() {
          case "$1" in
            *.html)        echo "text/html; charset=utf-8" ;;
            *.css)         echo "text/css; charset=utf-8" ;;
            *.js|*.mjs)    echo "text/javascript; charset=utf-8" ;;
            *.json)        echo "application/json; charset=utf-8" ;;
            *.svg)         echo "image/svg+xml" ;;
            *.xml)         echo "application/xml; charset=utf-8" ;;
            *.txt)         echo "text/plain; charset=utf-8" ;;
            *.map)         echo "application/json; charset=utf-8" ;;
            *.png)         echo "image/png" ;;
            *.jpg|*.jpeg)  echo "image/jpeg" ;;
            *.webp)        echo "image/webp" ;;
            *.gif)         echo "image/gif" ;;
            *.ico)         echo "image/x-icon" ;;
            *.avif)        echo "image/avif" ;;
            *.woff2)       echo "font/woff2" ;;
            *.woff)        echo "font/woff" ;;
            *.ttf)         echo "font/ttf" ;;
            *.wasm)        echo "application/wasm" ;;
            *.pdf)         echo "application/pdf" ;;
            *.mp4)         echo "video/mp4" ;;
            *)             echo "application/octet-stream" ;;
          esac
        }

        # Cache class: HTML-class for documents the gateway must revalidate
        # (.html/.json/.xml/.txt/.map), immutable for everything else
        # (fingerprinted assets — css/js/images/fonts/wasm). SPEC §4.6. The arg
        # is the already-lowercased path.
        cache_class_for() {
          case "$1" in
            *.html|*.json|*.xml|*.txt|*.map) echo "html" ;;
            *) echo "immutable" ;;
          esac
        }

        # --- b. walk outputDir; upload each blob; build the manifest files ----
        # Collect "<request-path>\t<sha>\t<ct>\t<cache>" lines, then assemble the
        # manifest with jq. request-path is the path relative to outputDir with a
        # leading "/".
        entries_file="$(mktemp)"
        uploaded=0
        skipped=0

        while IFS= read -r -d '' f; do
          rel="${f#"$out"/}"
          reqpath="/$rel"
          sha=$(sha256sum "$f" | cut -d' ' -f1)
          lc=$(printf '%s' "$f" | lower)
          ct=$(content_type_for "$lc")
          cache=$(cache_class_for "$lc")

          # PUT the blob (idempotent server-side: no-ops if it already exists).
          # ct + cache travel as query params (apiserver reads ?ct= and ?cache=);
          # the session as ?session=.
          blob_resp=$(curl -sSf -X PUT "$base/blobs/$sha?session=$session&ct=$(jq -rn --arg v "$ct" '$v|@uri')&cache=$cache" \
            -H "Authorization: Bearer $DEPLOYS_TOKEN" \
            -H "Content-Type: $ct" \
            --data-binary @"$f")
          existed=$(jq -r 'if .ok then (.result.existed // false) else "err" end' <<<"$blob_resp")
          if [ "$existed" = "err" ]; then
            echo "::error::blob upload failed for $reqpath: $(jq -r '.error.message // "unknown error"' <<<"$blob_resp")" >&2
            exit 1
          fi
          if [ "$existed" = "true" ]; then
            skipped=$((skipped + 1))
          else
            uploaded=$((uploaded + 1))
          fi

          printf '%s\t%s\t%s\t%s\n' "$reqpath" "$sha" "$ct" "$cache" >> "$entries_file"
        done < <(find "$out" -type f -print0)

        echo "Uploaded $uploaded blob(s), $skipped already present."

        # --- c. assemble the manifest, hash it, PUT the release ---------------
        # Build the files object with jq, sorted by path (canonical). The bytes
        # we hash MUST be exactly the bytes we PUT, so we write the manifest to a
        # file, sha256sum THAT file, then --data-binary @file.
        created_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        case "$(printf '%s' "$SPA" | lower)" in
          true|1|yes) spa_bool=true ;;
          *)          spa_bool=false ;;
        esac

        files_json=$(jq -Rn '
          [ inputs
            | split("\t")
            | { path: .[0], blob: .[1], ct: .[2], cache: .[3] }
          ]
          | sort_by(.path)
          | map({ (.path): { blob: .blob, ct: .ct, cache: .cache } })
          | add // {}
        ' < "$entries_file")

        # release-sha = sha256(the exact manifest bytes we PUT). The manifest's
        # own "release" field would be circular (its value is the hash of the
        # body that contains it), so we set "release" to "" inside the hashed
        # body: the apiserver does not read the field (it only verifies
        # sha256(received body) == the {release-sha} in the URL, then unmarshals
        # and stores), and the gateway derives the release-sha from the
        # Ingress-rewritten prefix, not from the body. We write the body to a
        # file, sha256sum THAT file, and --data-binary @file the same bytes, so
        # the hash and the uploaded bytes are provably identical.
        body_file="$(mktemp)"
        jq -nc \
          --arg createdAt "$created_at" \
          --arg environment "$ENVIRONMENT" \
          --argjson spa "$spa_bool" \
          --arg notFound "$NOT_FOUND" \
          --argjson files "$files_json" \
          '{ release: "", createdAt: $createdAt, environment: $environment,
             spa: $spa, notFound: $notFound, files: $files }' \
          > "$body_file"

        release_sha=$(sha256sum "$body_file" | cut -d' ' -f1)

        rel_resp=$(curl -sSf -X PUT "$base/releases/$release_sha?session=$session" \
          -H "Authorization: Bearer $DEPLOYS_TOKEN" \
          -H "Content-Type: application/json" \
          --data-binary @"$body_file")
        site_ref=$(jq -r 'if .ok then (.result.siteRef // "") else "" end' <<<"$rel_resp")
        if [ -z "$site_ref" ]; then
          echo "::error::release commit failed: $(jq -r '.error.message // "unknown error"' <<<"$rel_resp")" >&2
          exit 1
        fi

        rm -f "$entries_file" "$body_file"

        {
          echo "release_sha=$release_sha"
          echo "site_ref=$site_ref"
        } >> "$GITHUB_OUTPUT"
        echo "Published release $release_sha -> $site_ref"

    - id: deploy-static
      name: Deploy (static)
      if: inputs.mode == 'static'
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        DEPLOYS_TOKEN: ${{ steps.auth.outputs.deploys_token }}
        PROJECT: ${{ inputs.project }}
        LOCATION: ${{ inputs.location }}
        DEPLOYMENT: ${{ steps.plan.outputs.deployment }}
        SITE_REF: ${{ steps.publish.outputs.site_ref }}
        RELEASE_SHA: ${{ steps.publish.outputs.release_sha }}
        ENV_LINES: ${{ inputs.env }}
        ENV_GROUPS: ${{ inputs.envGroups }}
        TTL: ${{ steps.plan.outputs.ttl }}
      run: |
        set -euo pipefail

        # KEY=VALUE lines -> JSON object (empty lines ignored; any other
        # malformed line is an error rather than silently dropped). Same parser
        # as the container deploy step.
        env_json=$(jq -Rn '
          [inputs | select(length > 0)]
          | if any(test("^[^=]+=") | not) then error("malformed line")
            else map(capture("^(?<key>[^=]+)=(?<value>.*)$")) | from_entries end
        ' <<<"$ENV_LINES" 2>/dev/null || true)
        if [ -z "$env_json" ]; then
          echo "::error::env must be KEY=VALUE lines (one per line)" >&2
          exit 1
        fi

        # Env groups: one per line or comma-separated, trimmed, blanks dropped.
        # (Static deployments carry env + env groups but no pull secret — there
        # is no pod pulling an image.)
        groups_json=$(printf '%s' "$ENV_GROUPS" | tr ',' '\n' | jq -Rn '
          [inputs | gsub("^\\s+|\\s+$"; "") | select(length > 0)]')

        # Static deploy: type=Static, site=<site_ref>, no image/port/registry.
        body=$(jq -n \
          --arg project "$PROJECT" --arg location "$LOCATION" \
          --arg name "$DEPLOYMENT" --arg site "$SITE_REF" \
          --argjson env "$env_json" --argjson envGroups "$groups_json" \
          --argjson ttl "$TTL" \
          '{project: $project, location: $location, name: $name, type: "Static", site: $site, env: $env}
           + (if ($envGroups | length) > 0 then {envGroups: $envGroups} else {} end)
           + (if $ttl > 0 then {ttl: $ttl} else {} end)')

        resp=$(curl -sSf -X POST "$API/deployment.deploy" \
          -H "Authorization: Bearer $DEPLOYS_TOKEN" \
          -H 'Content-Type: application/json' \
          -d "$body")
        if [ "$(jq -r '.ok' <<<"$resp")" != "true" ]; then
          echo "::error::deploy failed: $(jq -r '.error.message // "unknown error"' <<<"$resp")" >&2
          exit 1
        fi

        resp=$(curl -sSf -X POST "$API/deployment.get" \
          -H "Authorization: Bearer $DEPLOYS_TOKEN" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n --arg project "$PROJECT" --arg location "$LOCATION" --arg name "$DEPLOYMENT" \
            '{project: $project, location: $location, name: $name}')")
        url=$(jq -r 'if .ok then .result.url // "" else "" end' <<<"$resp")
        {
          echo "url=$url"
          echo "artifact=$RELEASE_SHA"
        } >> "$GITHUB_OUTPUT"
        echo "Deployed $DEPLOYMENT -> ${url:-<no url>} (release $RELEASE_SHA)"

    # --- container deploy (mode != static) -----------------------------------

    - id: deploy
      name: Deploy
      if: inputs.mode != 'static'
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        DEPLOYS_TOKEN: ${{ steps.auth.outputs.deploys_token }}
        PROJECT: ${{ inputs.project }}
        LOCATION: ${{ inputs.location }}
        DEPLOYMENT: ${{ steps.plan.outputs.deployment }}
        IMAGE: ${{ steps.plan.outputs.image_ref }}@${{ steps.build.outputs.digest }}
        TYPE: ${{ inputs.type }}
        PORT: ${{ inputs.port }}
        ENV_LINES: ${{ inputs.env }}
        ENV_GROUPS: ${{ inputs.envGroups }}
        PULL_SECRET: ${{ inputs.pullSecret }}
        TTL: ${{ steps.plan.outputs.ttl }}
      run: |
        set -euo pipefail

        # KEY=VALUE lines -> JSON object (empty lines ignored; any other
        # malformed line is an error rather than silently dropped).
        env_json=$(jq -Rn '
          [inputs | select(length > 0)]
          | if any(test("^[^=]+=") | not) then error("malformed line")
            else map(capture("^(?<key>[^=]+)=(?<value>.*)$")) | from_entries end
        ' <<<"$ENV_LINES" 2>/dev/null || true)
        if [ -z "$env_json" ]; then
          echo "::error::env must be KEY=VALUE lines (one per line)" >&2
          exit 1
        fi

        # Env groups: one per line or comma-separated, trimmed, blanks dropped.
        groups_json=$(printf '%s' "$ENV_GROUPS" | tr ',' '\n' | jq -Rn '
          [inputs | gsub("^\\s+|\\s+$"; "") | select(length > 0)]')

        body=$(jq -n \
          --arg project "$PROJECT" --arg location "$LOCATION" \
          --arg name "$DEPLOYMENT" --arg image "$IMAGE" \
          --arg type "$TYPE" --argjson port "$PORT" \
          --argjson env "$env_json" --argjson envGroups "$groups_json" \
          --arg pullSecret "$PULL_SECRET" --argjson ttl "$TTL" \
          '{project: $project, location: $location, name: $name, image: $image, type: $type, env: $env}
           + (if $type == "WebService" or $type == "TCPService" or $type == "InternalTCPService" then {port: $port} else {} end)
           + (if ($envGroups | length) > 0 then {envGroups: $envGroups} else {} end)
           + (if $pullSecret != "" then {pullSecret: $pullSecret} else {} end)
           + (if $ttl > 0 then {ttl: $ttl} else {} end)')

        resp=$(curl -sSf -X POST "$API/deployment.deploy" \
          -H "Authorization: Bearer $DEPLOYS_TOKEN" \
          -H 'Content-Type: application/json' \
          -d "$body")
        if [ "$(jq -r '.ok' <<<"$resp")" != "true" ]; then
          echo "::error::deploy failed: $(jq -r '.error.message // "unknown error"' <<<"$resp")" >&2
          exit 1
        fi

        resp=$(curl -sSf -X POST "$API/deployment.get" \
          -H "Authorization: Bearer $DEPLOYS_TOKEN" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n --arg project "$PROJECT" --arg location "$LOCATION" --arg name "$DEPLOYMENT" \
            '{project: $project, location: $location, name: $name}')")
        url=$(jq -r 'if .ok then .result.url // "" else "" end' <<<"$resp")
        {
          echo "url=$url"
          echo "artifact=$IMAGE"
        } >> "$GITHUB_OUTPUT"
        echo "Deployed $DEPLOYMENT -> ${url:-<no url>}"

    - name: Report success
      if: success()
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        GITHUB_OIDC: ${{ steps.auth.outputs.github_token }}
        PROJECT: ${{ inputs.project }}
        LOCATION: ${{ inputs.location }}
        DEPLOYMENT: ${{ steps.plan.outputs.deployment }}
        ENVIRONMENT: ${{ steps.plan.outputs.environment }}
        PR_NUMBER: ${{ steps.plan.outputs.pr_number }}
        # URL + artifact are mode-aware: static deploys come from the
        # deploy-static step and carry the release-sha; container deploys come
        # from the deploy step and carry the image digest. github.notify has only
        # an `image` field — for static the apiserver stores the release-sha in
        # the run's image column and renders it under a `Site:` label (it infers
        # static from the deployment type, not from the body).
        URL: ${{ inputs.mode == 'static' && steps.deploy-static.outputs.url || steps.deploy.outputs.url }}
        IMAGE: ${{ inputs.mode == 'static' && steps.deploy-static.outputs.artifact || steps.deploy.outputs.artifact }}
      run: |
        set -euo pipefail
        curl -sS -X POST "$API/github.notify" \
          -H "Authorization: Bearer $GITHUB_OIDC" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n \
            --arg project "$PROJECT" --arg location "$LOCATION" \
            --arg deployment "$DEPLOYMENT" --arg environment "$ENVIRONMENT" \
            --argjson prNumber "$PR_NUMBER" \
            --arg sha "$GITHUB_SHA" --arg ref "$GITHUB_REF" \
            --arg url "$URL" --arg image "$IMAGE" \
            '{event: "success", project: $project, location: $location,
              deployment: $deployment, environment: $environment,
              prNumber: $prNumber, sha: $sha, ref: $ref, url: $url, image: $image}')" \
          | jq -r 'if .ok then empty else "::warning::notify(success) failed: \(.error.message // "unknown error")" end' \
          || echo "::warning::notify(success) failed"

    - name: Report failure
      if: failure() && steps.auth.outcome == 'success' && steps.plan.outcome == 'success'
      shell: bash
      env:
        API: ${{ inputs.apiEndpoint }}
        GITHUB_OIDC: ${{ steps.auth.outputs.github_token }}
        PROJECT: ${{ inputs.project }}
        LOCATION: ${{ inputs.location }}
        DEPLOYMENT: ${{ steps.plan.outputs.deployment }}
        ENVIRONMENT: ${{ steps.plan.outputs.environment }}
        PR_NUMBER: ${{ steps.plan.outputs.pr_number }}
      run: |
        set -euo pipefail
        curl -sS -X POST "$API/github.notify" \
          -H "Authorization: Bearer $GITHUB_OIDC" \
          -H 'Content-Type: application/json' \
          -d "$(jq -n \
            --arg project "$PROJECT" --arg location "$LOCATION" \
            --arg deployment "$DEPLOYMENT" --arg environment "$ENVIRONMENT" \
            --argjson prNumber "$PR_NUMBER" \
            --arg sha "$GITHUB_SHA" --arg ref "$GITHUB_REF" \
            '{event: "failure", project: $project, location: $location,
              deployment: $deployment, environment: $environment,
              prNumber: $prNumber, sha: $sha, ref: $ref}')" \
          >/dev/null || true
